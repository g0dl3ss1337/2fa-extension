<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div id="screen-setup" class="screen hidden">
    <div class="lock-screen">
      <div class="lock-icon">🔐</div>
      <h3>Welcome</h3>
      <p class="lock-hint">Create a master password to protect your keys.<br>It cannot be recovered — remember it.</p>
      <input type="password" id="setup-password" placeholder="Master Password" autocomplete="new-password">
      <div class="strength-bar-wrap">
        <div class="strength-bar" id="strength-bar"></div>
      </div>
      <span class="strength-label" id="strength-label"></span>
      <input type="password" id="setup-password-confirm" placeholder="Confirm Password" autocomplete="new-password">
      <button id="setup-btn">Create Storage</button>
      <span id="setup-error" class="form-error hidden"></span>
    </div>
  </div>

  <div id="screen-unlock" class="screen hidden">
    <div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <h3>My 2FA Authenticator</h3>
      <p class="lock-hint">Enter the master password to access your keys</p>
      <input type="password" id="unlock-password" placeholder="Master Password" autocomplete="current-password">
      <button id="unlock-btn">Unlock</button>
      <span id="unlock-error" class="form-error hidden"></span>
    </div>
  </div>

  <div id="screen-main" class="screen hidden">

    <div class="header">
      <h3>🔐 My 2FA Authenticator</h3>
      <div class="header-actions">

        <button id="settings-btn" title="Settings" class="header-icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>

        <button id="search-btn" title="Search" class="header-icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>

        <button id="lock-btn" title="Lock" class="header-icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </button>

        <button id="toggle-add-btn" title="Add Key">+</button>
      </div>
    </div>

    <div id="search-bar" class="search-bar hidden">
      <div class="search-input-wrap">
        <svg class="search-icon-inline" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Search accounts…" autocomplete="off">
        <button id="search-clear" class="search-clear hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="add-form" class="add-form hidden">
      <input type="text" id="new-name" placeholder="Name (e.g., GitHub)">
      <input type="text" id="new-secret" placeholder="Secret Key (Base32)">

      <button type="button" id="advanced-toggle" class="advanced-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
        Advanced
      </button>
      <div id="advanced-fields" class="advanced-fields hidden">
        <div class="advanced-row">
          <label>Period (sec)</label>
          <select id="new-period">
            <option value="30" selected>30</option>
            <option value="60">60</option>
          </select>
        </div>
        <div class="advanced-row">
          <label>Algorithm</label>
          <select id="new-algorithm">
            <option value="SHA1" selected>SHA-1</option>
            <option value="SHA256">SHA-256</option>
            <option value="SHA512">SHA-512</option>
          </select>
        </div>
        <div class="advanced-row">
          <label>Digits</label>
          <select id="new-digits">
            <option value="6" selected>6</option>
            <option value="8">8</option>
          </select>
        </div>
      </div>

      <span id="secret-error" class="form-error hidden"></span>
      <button id="save-btn">Save</button>
    </div>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-section-title">Theme</div>
      <div class="theme-options">
        <button class="theme-btn" data-theme="original">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#1e1e2e 50%,#a6e3a1 50%)"></span>
          Original
        </button>
        <button class="theme-btn" data-theme="oled">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#000 50%,#00ff88 50%)"></span>
          OLED Black
        </button>
        <button class="theme-btn" data-theme="white">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#f5f5f5 50%,#4f46e5 50%)"></span>
          White
        </button>
      </div>

      <div class="settings-divider"></div>
      <div class="settings-section-title">Security</div>

      <button id="change-pw-btn" class="settings-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Change master password
      </button>

      <div class="settings-divider"></div>
      <div class="settings-section-title">Data</div>

      <button id="export-btn" class="settings-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Export vault
      </button>
      <button id="import-btn" class="settings-action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 5 17 10"></polyline>
          <line x1="12" y1="5" x2="12" y2="17"></line>
        </svg>
        Import vault
      </button>
      <input type="file" id="import-file" accept=".json" class="hidden">
      <span id="settings-msg" class="form-error hidden" style="color:var(--accent-color)"></span>
    </div>

    <div id="auth-list" class="auth-list"></div>
  </div>

  <script src="otplib-browser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
